name: Backtest Semanal Magic Formula BR

on:
  schedule:
    - cron: '0 11 * * 1'  # Segunda-feira 11h UTC (8h BRT)
  workflow_dispatch:        # Permite rodar manualmente pelo GitHub

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install pandas numpy yfinance beautifulsoup4 httpx

      - name: Exportar universo de tickers
        run: python src/export_tickers.py

      - name: Rodar backtest
        run: python src/backtester.py --tickers output/universe_tickers.json --start 2023-01-01 --top 15

      - name: Gerar relatório HTML
        run: python src/report_backtest.py --json output/backtest.json

      - name: Injetar data de atualização no HTML
        run: |
          DATA=$(date '+%d/%m/%Y %H:%M UTC')
          python3 -c "
          with open('output/relatorio_backtest.html', 'r', encoding='utf-8') as f:
              html = f.read()
          badge = '<div style=\"position:fixed;bottom:12px;right:16px;background:#1a1a2e;color:#888;font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid #333;font-family:monospace;z-index:9999\">Atualizado em $DATA</div>'
          html = html.replace('</body>', badge + '</body>')
          with open('output/relatorio_backtest.html', 'w', encoding='utf-8') as f:
              f.write(html)
          "

      - name: Copiar para docs/
        run: cp output/relatorio_backtest.html docs/backtest.html

      - name: Commit e push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/backtest.html
          git diff --staged --quiet || git commit -m "Backtest atualizado — $(date '+%Y-%m-%d')"
          git push
