name: 📊 Backtest Diário

on:
  schedule:
    - cron: '0 12 * * 1-5'   # 9h BRT (UTC-3), dias úteis
  workflow_dispatch:           # botão manual no GitHub

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Exportar universo de tickers
        run: python src/export_tickers.py

      - name: Rodar backtest
        run: >
          python src/backtester.py
          --tickers output/universe_tickers.json
          --start 2023-01-01
          --top 15
          --hold-buffer 2.0

      - name: Gerar relatório HTML
        run: >
          python src/report_backtest.py
          --json output/backtest.json
          --output docs/backtest.html

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/backtest.html output/backtest.json
          git diff --staged --quiet && echo "Sem mudanças" || \
            git commit -m "📊 Backtest atualizado $(date +'%Y-%m-%d')" && git push
