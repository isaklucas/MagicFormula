name: Backtest Semanal Magic Formula BR + US + SC + FII

on:
  schedule:
    - cron: '0 11 * * 1'  # Segunda-feira 11h UTC (8h BRT)
  workflow_dispatch:        # Permite rodar manualmente pelo GitHub

concurrency:
  group: backtest-semanal
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false   # um backtest quebrado não derruba os outros
      max-parallel: 4
      matrix:
        include:
          - name: BR
            universe_cmd: python src/export_tickers.py
            backtest_cmd: python src/backtester.py --tickers output/universe_tickers.json --start 2023-01-01 --top 15
            report_cmd: python src/report_backtest.py --json output/backtest.json --output output/relatorio_backtest.html
            html: output/relatorio_backtest.html
            docs: docs/backtest.html
            badge_bg: '#1a1a2e'
            badge_border: '#333'
            badge_label: 'Atualizado em'

          - name: US
            universe_cmd: python src/export_tickers_us.py
            backtest_cmd: python src/backtester_us.py --tickers output/universe_tickers_us.json --sectors output/universe_sectors_us.json --start 2023-01-01 --top 15
            report_cmd: python src/report_backtest_us.py --json output/backtest_us.json --output output/relatorio_backtest_us.html
            html: output/relatorio_backtest_us.html
            docs: docs/backtest_us.html
            badge_bg: '#0d1117'
            badge_border: '#30363d'
            badge_label: 'Updated'

          - name: SmallCap
            universe_cmd: python src/export_tickers_smallcap.py
            backtest_cmd: python src/backtester_us.py --tickers output/universe_tickers_smallcap.json --sectors output/universe_sectors_smallcap.json --start 2023-01-01 --top 15 --benchmark "IJR" --benchmark-name "S&P SmallCap 600 (IJR)" --cache-dir output/backtest_cache_sc --output output/backtest_sc.json
            report_cmd: python src/report_backtest_us.py --json output/backtest_sc.json --output output/relatorio_backtest_sc.html --title "Magic Formula Small Cap"
            html: output/relatorio_backtest_sc.html
            docs: docs/backtest_sc.html
            badge_bg: '#0d1117'
            badge_border: '#30363d'
            badge_label: 'Updated'

          - name: FII
            universe_cmd: 'python -c "import sys; sys.path.insert(0, ''src''); from fii_si_scraper import fetch_all_si; fetch_all_si(force=True)"'
            backtest_cmd: python src/backtester_fii.py --start 2023-01-01 --output output/backtest_fii.json
            report_cmd: python src/report_backtest_fii.py --json output/backtest_fii.json --output output/relatorio_backtest_fii.html
            html: output/relatorio_backtest_fii.html
            docs: docs/backtest_fii.html
            badge_bg: '#1a1a2e'
            badge_border: '#333'
            badge_label: 'Atualizado em'

    name: Backtest ${{ matrix.name }}

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependências
        run: pip install pandas numpy yfinance beautifulsoup4 httpx lxml rich

      # data/fii_cache é gitignored: sem isto o runner nasce sem cache nenhum e o
      # fallback do scraper não tem para onde cair quando o Fundamentus não responde.
      - name: Restaurar cache do Fundamentus — ${{ matrix.name }}
        if: matrix.name == 'FII'
        uses: actions/cache@v4
        with:
          path: data/fii_cache
          key: fii-cache-${{ github.run_id }}
          restore-keys: fii-cache-

      - name: Exportar universo — ${{ matrix.name }}
        run: ${{ matrix.universe_cmd }}

      - name: Rodar backtest — ${{ matrix.name }}
        run: ${{ matrix.backtest_cmd }}

      - name: Gerar relatório HTML — ${{ matrix.name }}
        run: ${{ matrix.report_cmd }}

      - name: Injetar data de atualização — ${{ matrix.name }}
        env:
          HTML_PATH: ${{ matrix.html }}
          BADGE_BG: ${{ matrix.badge_bg }}
          BADGE_BORDER: ${{ matrix.badge_border }}
          BADGE_LABEL: ${{ matrix.badge_label }}
        run: |
          python - <<'PY'
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          path = Path(os.environ["HTML_PATH"])
          data = datetime.now(timezone.utc).strftime("%d/%m/%Y %H:%M UTC")
          badge = (
              '<div style="position:fixed;bottom:12px;right:16px;'
              f'background:{os.environ["BADGE_BG"]};color:#888;font-size:11px;padding:4px 10px;'
              f'border-radius:6px;border:1px solid {os.environ["BADGE_BORDER"]};'
              'font-family:monospace;z-index:9999">'
              f'{os.environ["BADGE_LABEL"]} {data}</div>'
          )
          html = path.read_text(encoding="utf-8")
          html = html.replace("</body>", badge + "</body>")
          path.write_text(html, encoding="utf-8")
          print(f"badge injetado em {path}")
          PY

      - name: Copiar para docs/ — ${{ matrix.name }}
        run: cp "${{ matrix.html }}" "${{ matrix.docs }}"

      - name: Upload artefato — ${{ matrix.name }}
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ matrix.name }}
          path: ${{ matrix.html }}
          retention-days: 14

      - name: Commit e push — ${{ matrix.name }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add "${{ matrix.docs }}"

          if git diff --staged --quiet; then
            echo "Sem alterações em ${{ matrix.docs }} — nada a commitar."
            exit 0
          fi

          git commit -m "Backtest ${{ matrix.name }} — $(date '+%Y-%m-%d')"

          # jobs paralelos empurram para o mesmo branch: rebase + retry
          for tentativa in 1 2 3 4 5; do
            if git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "push OK na tentativa $tentativa"
              exit 0
            fi
            echo "push falhou (tentativa $tentativa), retry..."
            sleep $(( RANDOM % 10 + 5 ))
          done
          echo "::error::push falhou após 5 tentativas"
          exit 1
