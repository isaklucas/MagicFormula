name: 🧮 Publicar Magic Formula

on:
  push:
    paths:
      - 'docs/index.html'      # dispara quando deploy.ps1 faz push
      - 'docs/backtest.html'
  workflow_dispatch:

# Apenas publica Pages — analise roda localmente via Claude Code
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - uses: actions/deploy-pages@v4
        id: deployment
